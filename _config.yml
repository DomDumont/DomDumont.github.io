lang: en
timezone: Europe/Paris

title: DomDumont
tagline: Developer · Game maker · Tinkerer
description: >-
  Personal blog and portfolio of DomDumont — dev notes, app releases, and game experiments.

url: "https://domdumont.github.io"
baseurl: ""

github:
  username: DomDumont

social:
  name: DomDumont
  email: ""
  links:
    - https://github.com/DomDumont

# Theme mode: leave empty for auto (follows system preference), or set "light" / "dark"
theme_mode:

# Avatar image path (place your photo at assets/img/avatar.jpg)
avatar: "https://www.gravatar.com/avatar/acdacf51f601cef4f12d96d5a305ac28?s=400"

# Site-wide table of contents
toc: true

# Comments — configure one provider when ready
comments:
  active:
  # disqus:
  #   shortname:
  # utterances:
  #   repo:
  #   issue_term:
  # giscus:
  #   repo:
  #   repo_id:
  #   category:
  #   category_id:
  #   mapping:
  #   input_position:
  #   lang:

# Analytics — add your GA4 measurement ID when ready
analytics:
  google:
    id:

paginate: 10

theme: jekyll-theme-chirpy

plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-seo-tag
  - jekyll-archives
  - jekyll-include-cache

jekyll-archives:
  enabled: [categories, tags]
  layouts:
    category: category
    tag: tag
  permalinks:
    tag: /tags/:name/
    category: /categories/:name/

collections:
  tabs:
    output: true
    sort_by: order

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      comments: false
      toc: true
  - scope:
      path: ""
      type: tabs
    values:
      layout: page
      permalink: /:title/

exclude:
  - "*.gem"
  - "*.gemspec"
  - Gemfile
  - Gemfile.lock
  - LICENSE
  - node_modules
  - vendor
